name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, json, zip, exif, curl
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run tests
        run: bin/phpunit

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: openssl, json, zip, exif, curl
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run PHPStan
        run: bin/phpstan analyse --memory-limit=512M
